syntax = "proto3";
package hub.v1;

import "google/protobuf/timestamp.proto";

enum MeasurementClass {
  MEASUREMENT_CLASS_UNSPECIFIED = 0;
  TECHNICAL = 1;
  SAMPLE = 2;
  PATIENT = 3;
}

// Context for all mutating commands (audit trail and traceability)
message CommandContext {
  string command_id = 1;
  string user = 2;
  string reason = 3;
  google.protobuf.Timestamp timestamp = 4;
  MeasurementClass measurement_class = 5;
}

message Empty {}

// Safety state machine shared by DiFRA and Omniscan.
enum ServerState {
  STATE_UNSPECIFIED = 0;
  IDLE = 1;
  PENDING_ARMED = 2;
  RUNNING = 3;
  PAUSED = 4;
  STOPPING = 5;
  SAFE = 6;
  LOCKED = 7;
  MAINTENANCE = 8;
}

enum DetectorStatus {
  DETECTOR_OFF = 0;
  DETECTOR_INIT = 1;
  DETECTOR_IDLE = 2;
  DETECTOR_EXPOSING = 3;
  DETECTOR_READING = 4;
  DETECTOR_ERROR = 5;
}

enum MotionStatus {
  MOTION_OFF = 0;
  MOTION_INIT = 1;
  MOTION_IDLE = 2;
  MOTION_MOVING = 3;
  MOTION_HOMING = 4;
  MOTION_ERROR = 5;
  MOTION_LIMIT_HIT = 6;
}

message InterlockStatus {
  bool emergency_stop = 1;
  bool door_closed = 2;
  bool radiation_safe = 3;
  bool cooling_ok = 4;
  bool power_ok = 5;
  bool overall_safe = 6;
  string violation_reason = 7;
  bool enable_button = 8;
  bool key_switch = 9;
}

message LockStatus {
  bool device_locked = 1;
  bool session_locked = 2;
  bool technical_container_locked = 3;
}

message DetectorHealth {
  bool powered = 1;
  float temperature = 2;
  float voltage = 3;
  DetectorStatus status = 4;
  uint32 last_exposure_time = 5;
  uint64 total_exposures = 6;
  uint64 uptime_seconds = 7;
}

message MotionHealth {
  bool powered = 1;
  MotionStatus status = 2;
  optional double position = 3;
  optional double target_position = 4;
  bool is_homed = 5;
  uint64 total_moves = 6;
  uint64 uptime_seconds = 7;
}

message DeviceStateRequest {
  string device_type = 1;
}

message DeviceStateResponse {
  string device_type = 1;
  bool powered = 2;
  string status = 3;
  uint64 uptime_seconds = 4;
  map<string, bool> outputs = 5;
}

message ExposureResult {
  uint32 exposure_time_ms = 1;
  google.protobuf.Timestamp timestamp = 2;
  uint64 data_size = 3;
  optional string data_path = 4;
  float detector_temp = 5;
}

message StartExposureRequest {
  CommandContext ctx = 1;
  uint32 exposure_time_ms = 2;
  uint32 max_timeout_ms = 3;
}

message PauseRequest { CommandContext ctx = 1; }
message ResumeRequest { CommandContext ctx = 1; }
message StopRequest { CommandContext ctx = 1; }
message AbortRequest { CommandContext ctx = 1; }

message MoveToRequest {
  CommandContext ctx = 1;
  double position_mm = 2;
}

message MoveRelativeRequest {
  CommandContext ctx = 1;
  double distance_mm = 2;
}

message HomeRequest { CommandContext ctx = 1; }

message SetVelocityRequest {
  CommandContext ctx = 1;
  double velocity_mm_s = 2;
}

message PowerDeviceRequest {
  CommandContext ctx = 1;
  string device_type = 2;
  bool power_on = 3;
}

message StartBackgroundMeasurementRequest {
  CommandContext ctx = 1;
  uint32 exposure_time_ms = 2;
}

message BackgroundMeasurementResponse {
  bool success = 1;
  string error_message = 2;
  optional ExposureResult result = 3;
}

message InitializeDetectorRequest { CommandContext ctx = 1; }
message InitializeMotionRequest { CommandContext ctx = 1; }

message GpioStateResponse {
  bool powered = 1;
  bool key_switch_on = 2;
  bool activation_button_active = 3;
  optional uint32 activation_remaining_secs = 4;
  InterlockStatus interlocks = 5;
  string main_led = 6;
  string radiation_led = 7;
}

message DetectorStateResponse {
  bool powered = 1;
  bool initialized = 2;
  DetectorStatus status = 3;
  float temperature = 4;
  uint64 total_exposures = 5;
}

message MotionStateResponse {
  bool powered = 1;
  bool initialized = 2;
  bool is_homed = 3;
  MotionStatus status = 4;
  optional double position_x = 5;
  optional double position_y = 6;
  uint64 total_moves = 7;
}

message FullServerStateResponse {
  ServerState safety_state = 1;
  GpioStateResponse gpio = 2;
  DetectorStateResponse detector = 3;
  MotionStateResponse motion = 4;
  google.protobuf.Timestamp timestamp = 5;
  LockStatus locks = 6;
}

message StateChangeNotification {
  google.protobuf.Timestamp timestamp = 1;
  string component = 2;
  string change_type = 3;
}

message GetStateResponse {
  ServerState state = 1;
  string detail = 2;
  InterlockStatus interlocks = 3;
  google.protobuf.Timestamp timestamp = 4;
  LockStatus locks = 5;
}

message GetPositionResponse {
  optional double position_mm = 1;
  bool is_homed = 2;
}

message GetExposureResultResponse {
  bool has_result = 1;
  optional ExposureResult result = 2;
}

message HealthComponent {
  string name = 1;
  bool ok = 2;
  string detail = 3;
  google.protobuf.Timestamp last_check = 4;
}

message AggregateHealth {
  bool ok = 1;
  repeated HealthComponent components = 2;
  InterlockStatus interlocks = 3;
}

enum CommandLifecyclePhase {
  COMMAND_LIFECYCLE_PHASE_UNSPECIFIED = 0;
  COMMAND_STARTED = 1;
  COMMAND_DONE = 2;
}

message CommandLifecycleEvent {
  string command_id = 1;
  string service_name = 2;
  string command_name = 3;
  CommandLifecyclePhase phase = 4;
  bool success = 5;
  string reason = 6;
}

message RunStartedEvent {
  string run_id = 1;
  string run_type = 2;
  uint32 total_seconds = 3;
}

message RunProgressEvent {
  string run_id = 1;
  string run_type = 2;
  uint32 elapsed_seconds = 3;
  uint32 total_seconds = 4;
  optional double position_mm = 5;
}

message RunCompletedEvent {
  string run_id = 1;
  string run_type = 2;
  string status = 3;
  string reason = 4;
}

enum IncidentSeverity {
  INFO = 0;
  WARNING = 1;
  LOW = 2;
  MODERATE = 3;
  HIGH = 4;
  CRITICAL = 5;
}

message IncidentEvent {
  string incident_id = 1;
  string code = 2;
  IncidentSeverity severity = 3;
  string message = 4;
  google.protobuf.Timestamp timestamp = 5;
  MeasurementClass measurement_class = 6;
  optional string run_id = 7;
  optional uint64 point_index = 8;
  map<string, string> metadata = 9;
}

message SystemEvent {
  google.protobuf.Timestamp timestamp = 1;
  oneof event {
    StateChangedEvent state_changed = 2;
    InterlockEvent interlock_event = 3;
    ExposureEvent exposure_event = 4;
    MotionEvent motion_event = 5;
    ErrorEvent error = 6;
    RunStartedEvent run_started = 7;
    RunProgressEvent run_progress = 8;
    RunCompletedEvent run_completed = 9;
    CommandLifecycleEvent command_lifecycle = 10;
  }
}

message StateChangedEvent {
  ServerState old_state = 1;
  ServerState new_state = 2;
  string reason = 3;
}

message InterlockEvent {
  InterlockStatus status = 1;
  string triggered_by = 2;
}

message ExposureEvent {
  enum Type {
    STARTED = 0;
    COMPLETED = 1;
    STOPPED = 2;
    FAILED = 3;
    PAUSED = 4;
    RESUMED = 5;
  }
  Type type = 1;
  uint32 exposure_time_ms = 2;
}

message MotionEvent {
  enum Type {
    MOVE_STARTED = 0;
    MOVE_COMPLETED = 1;
    HOME_COMPLETED = 2;
    STOPPED = 3;
    LIMIT_HIT = 4;
  }
  Type type = 1;
  optional double position_mm = 2;
}

message ErrorEvent {
  string component = 1;
  string error_message = 2;
  string error_code = 3;
}

service Acquisition {
  rpc StartExposure(StartExposureRequest) returns (Empty);
  rpc Pause(PauseRequest) returns (Empty);
  rpc Resume(ResumeRequest) returns (Empty);
  rpc Stop(StopRequest) returns (Empty);
  rpc Abort(AbortRequest) returns (Empty);
  rpc GetState(Empty) returns (GetStateResponse);
  rpc GetLastExposureResult(Empty) returns (GetExposureResultResponse);
  rpc StartBackgroundMeasurement(StartBackgroundMeasurementRequest) returns (BackgroundMeasurementResponse);
  rpc SubscribeRunEvents(Empty) returns (stream SystemEvent);
}

service Motion {
  rpc MoveTo(MoveToRequest) returns (Empty);
  rpc MoveRelative(MoveRelativeRequest) returns (Empty);
  rpc Home(HomeRequest) returns (Empty);
  rpc Stop(StopRequest) returns (Empty);
  rpc SetVelocity(SetVelocityRequest) returns (Empty);
  rpc GetPosition(Empty) returns (GetPositionResponse);
}

service DeviceControl {
  rpc PowerDevice(PowerDeviceRequest) returns (Empty);
  rpc GetDetectorHealth(Empty) returns (DetectorHealth);
  rpc GetMotionHealth(Empty) returns (MotionHealth);
  rpc GetDeviceState(DeviceStateRequest) returns (DeviceStateResponse);
}

service Safety {
  rpc GetInterlockStatus(Empty) returns (InterlockStatus);
  rpc ResetInterlocks(CommandContext) returns (Empty);
  rpc CheckSafetyToOperate(Empty) returns (InterlockStatus);
}

service Health {
  rpc Liveness(Empty) returns (Empty);
  rpc Readiness(Empty) returns (Empty);
  rpc GetAggregateHealth(Empty) returns (AggregateHealth);
}

service StateMonitor {
  rpc SubscribeToStateUpdates(Empty) returns (stream StateChangeNotification);
  rpc SubscribeIncidents(Empty) returns (stream IncidentEvent);
  rpc GetFullServerState(Empty) returns (FullServerStateResponse);
  rpc GetGpioState(Empty) returns (GpioStateResponse);
  rpc GetDetectorState(Empty) returns (DetectorStateResponse);
  rpc GetMotionState(Empty) returns (MotionStateResponse);
}

service DeviceInitialization {
  rpc InitializeDetector(InitializeDetectorRequest) returns (DetectorStateResponse);
  rpc InitializeMotion(InitializeMotionRequest) returns (MotionStateResponse);
  rpc PowerOffDetector(CommandContext) returns (Empty);
  rpc PowerOffMotion(CommandContext) returns (Empty);
}

message FieldDescriptor {
  string name = 1;
  string type = 2;
  bool required = 3;
  string description = 4;
  optional string default_value = 5;
}

message CommandDescriptor {
  string service_name = 1;
  string command_name = 2;
  string description = 3;
  repeated FieldDescriptor request_fields = 4;
  string response_type = 5;
  repeated FieldDescriptor response_fields = 6;
  repeated string required_permissions = 7;
  repeated string safety_requirements = 8;
}

message ServerCapabilities {
  string server_version = 1;
  string protocol_version = 2;
  google.protobuf.Timestamp build_time = 3;
  repeated string supported_features = 4;
  string device_type = 5;
}

message GetServerCapabilitiesResponse {
  ServerCapabilities capabilities = 1;
}

message ListCommandsResponse {
  repeated CommandDescriptor commands = 1;
  ServerCapabilities server_info = 2;
}

message ValidateCompatibilityRequest {
  string client_version = 1;
  string client_protocol_version = 2;
  repeated string required_commands = 3;
}

message ValidateCompatibilityResponse {
  bool compatible = 1;
  string message = 2;
  repeated string missing_commands = 3;
  repeated string version_warnings = 4;
  bool protocol_compatible = 5;
}

message CommandReadiness {
  string service_name = 1;
  string command_name = 2;
  bool ready = 3;
  repeated string reasons = 4;
}

message GetCommandReadinessResponse {
  repeated CommandReadiness items = 1;
}

service CommandDiscovery {
  rpc GetServerCapabilities(Empty) returns (GetServerCapabilitiesResponse);
  rpc ListCommands(Empty) returns (ListCommandsResponse);
  rpc ValidateCompatibility(ValidateCompatibilityRequest) returns (ValidateCompatibilityResponse);
  rpc GetCommandReadiness(Empty) returns (GetCommandReadinessResponse);
}
