command_id = "pause"
description = "Pause active acquisition workflow"
service = "Acquisition"
audit_level = "High"
risk_level = "Medium"

[safety_requirements]
allowed_states = ["Running", "PendingArmed"]
requires_enable_button = false
requires_calibration = false
requires_key_switch = true
interlock_checks = []
max_execution_time_seconds = 5

[execution]
rollback_on_failure = false

[[execution.steps]]
type = "CallDevice"
device = "detector"
method = "pause"
parameters = []

[[execution.error_cleanup]]
type = "LogAudit"
event_type = "pause_failed"
message = "Pause command failed"
