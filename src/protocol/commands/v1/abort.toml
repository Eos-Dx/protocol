command_id = "abort"
description = "Emergency abort of active operations"
service = "Acquisition"
audit_level = "Critical"
risk_level = "Critical"

[safety_requirements]
allowed_states = ["Running", "Paused", "PendingArmed", "Stopping", "Idle", "Safe", "Locked"]
requires_enable_button = false
requires_calibration = false
requires_key_switch = false
interlock_checks = []
max_execution_time_seconds = 5

[execution]
rollback_on_failure = false

[[execution.steps]]
type = "CallDevice"
device = "detector"
method = "stop_exposure"
parameters = []

[[execution.steps]]
type = "CallDevice"
device = "motion"
method = "stop"
parameters = []

[[execution.error_cleanup]]
type = "LogAudit"
event_type = "abort_failed"
message = "Abort command failed"
