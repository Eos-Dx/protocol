command_id = "initialize_detector"
description = "Initialize detector hardware"
service = "DeviceInitialization"
audit_level = "High"
risk_level = "Medium"

[safety_requirements]
allowed_states = ["Idle", "Locked"]
requires_enable_button = true
requires_calibration = false
requires_key_switch = true
enable_timeout_seconds = 20
max_execution_time_seconds = 60

[[safety_requirements.interlock_checks]]
name = "emergency_stop"
required_value = false
error_message = "Emergency stop is pressed"

[[safety_requirements.interlock_checks]]
name = "door_closed"
required_value = true
error_message = "Safety door must be closed"

[execution]
rollback_on_failure = true

[[execution.steps]]
type = "CallDevice"
device = "detector"
method = "initialize"
parameters = []

[[execution.error_cleanup]]
type = "LogAudit"
event_type = "detector_init_failed"
message = "Detector initialization failed"
