command_id = "stop"
description = "Stop current acquisition"
service = "Acquisition"
audit_level = "High"
risk_level = "Medium"

[safety_requirements]
allowed_states = ["Running", "Paused", "PendingArmed", "Stopping"]
requires_enable_button = false
requires_calibration = false
requires_key_switch = true
interlock_checks = []
max_execution_time_seconds = 10

[execution]
rollback_on_failure = false

[[execution.steps]]
type = "CallDevice"
device = "detector"
method = "stop_exposure"
parameters = []

[[execution.error_cleanup]]
type = "LogAudit"
event_type = "stop_failed"
message = "Stop command failed"
