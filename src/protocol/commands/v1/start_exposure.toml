command_id = "start_exposure"
description = "Start detector exposure"
service = "Acquisition"
audit_level = "Critical"
risk_level = "High"

[safety_requirements]
allowed_states = ["Idle", "PendingArmed"]
requires_enable_button = true
requires_calibration = false
requires_key_switch = true
enable_timeout_seconds = 20
max_execution_time_seconds = 300

[[safety_requirements.interlock_checks]]
name = "door_closed"
required_value = true
error_message = "Safety door must be closed"

[[safety_requirements.interlock_checks]]
name = "emergency_stop"
required_value = false
error_message = "Emergency stop is pressed"

[[parameters]]
name = "exposure_time_ms"
required = true
description = "Exposure time in milliseconds"
default_value = "1000"

[parameters.param_type]
type = "Integer"
min = 100
max = 300000

[[parameters]]
name = "max_timeout_ms"
required = false
description = "Maximum timeout in milliseconds"
default_value = "300000"

[parameters.param_type]
type = "Integer"
min = 1000
max = 600000

[execution]
rollback_on_failure = true

[[execution.steps]]
type = "CallDevice"
device = "detector"
method = "start_exposure"
parameters = ["exposure_time_ms"]

[[execution.error_cleanup]]
type = "CallDevice"
device = "detector"
method = "stop_exposure"
parameters = []
